.node_ci: &node_ci
  docker:
    image: node:20
    volumes:
      - /root/.npm:copy-on-write
  env:
    NEXT_TELEMETRY_DISABLED: "1"
  stages:
    - name: install
      script: npm ci
    - name: test
      script: npm test
    - name: build
      script: NODE_ENV=production npm run build

main:
  push:
    - name: build
      <<: *node_ci

    - name: build-and-push-image
      services:
        - docker
      env:
        IMAGE_REPO: "$CNB_DOCKER_REGISTRY/$CNB_REPO_SLUG_LOWERCASE"
      stages:
        - name: docker info
          script: |
            set -eu
            echo "Registry: $CNB_DOCKER_REGISTRY"
            echo "Repo:     $CNB_REPO_SLUG_LOWERCASE"
            echo "Commit:   $CNB_COMMIT"
            echo "Image:    $IMAGE_REPO:latest"
            echo "Image:    $IMAGE_REPO:$CNB_COMMIT"
            docker version
        - name: docker build
          script: |
            set -eu
            docker build \
              --pull \
              -t "$IMAGE_REPO:$CNB_COMMIT" \
              -t "$IMAGE_REPO:latest" \
              .
        - name: docker push
          script: |
            set -eu
            docker push "$IMAGE_REPO:$CNB_COMMIT"
            docker push "$IMAGE_REPO:latest"

    - name: update-knowledge-base
      stages:
        - name: update
          type: knowledge:update
          options:
            include:
              - README.md
              - app/docs/**/*.mdx
              - docs/**/*.md
            exclude:
              - node_modules/**
              - .next/**
              - out/**
              - examples/**/workspace/**

$:
  pull_request:
    - name: verify
      <<: *node_ci
