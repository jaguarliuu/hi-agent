main:
  push:
    # =====================================================================
    # 单 Pipeline 串行流水线
    #
    # 关键背景：CNB 的语义是「同一 event 下多个 pipeline = 并行；同一 pipeline
    # 内的多个 stage = 串行」，不存在 GitHub Actions 那样的 `needs` 关键字。
    # 此前把 build / build-and-push-image / deploy-to-server 写成 3 个并列
    # pipeline，导致 deploy 不等 push 完成就先跑（用的还是带 docker service 的
    # 慢 runner），从而部署到服务器上的「最新镜像」其实是上次构建残留的旧镜像。
    #
    # 此处统一为单 pipeline + 多 stage，自上而下严格串行：
    #   1. install / test / build      ← 校验代码并产出 out/
    #   2. docker build / docker push  ← 把当前 commit 打包并推到 registry
    #   3. deploy-to-server            ← ssh 远端拉取新镜像并强制重建容器
    # =====================================================================
    - name: build-test-deploy
      docker:
        # 同一 pipeline 共享一个 runner，统一用 node:20。
        # node:20 基于 debian-slim，自带 apt，可以在 deploy stage 临时安装 ssh
        # 客户端。docker build/push 通过下面的 `services: docker` 注入 daemon。
        image: node:20
        volumes:
          - /root/.npm:copy-on-write
      services:
        # docker service 给本 pipeline 注入 dockerd，使 docker CLI 可用。
        - docker
      env:
        NEXT_TELEMETRY_DISABLED: "1"
        IMAGE_REPO: "$CNB_DOCKER_REGISTRY/$CNB_REPO_SLUG_LOWERCASE"
        IMAGE_REGISTRY: "docker.cnb.cool"
        DEPLOY_PATH: "/opt/hi-agent"
      imports:
        # 部署阶段需要的密钥（DEPLOY_HOST / DEPLOY_USER / DEPLOY_SSH_KEY）。
        # 在 pipeline 顶层 import 一次，所有 stage 都可见。
        - https://cnb.cool/jaguarliu.cool/keys/-/blob/main/git_token.yml
      stages:
        # -----------------------------------------------------------------
        # Stage 1：Node 代码验证（依赖、单测、产出 Next 静态导出）
        # -----------------------------------------------------------------
        - name: install
          script: npm ci
        - name: test
          script: npm test
        - name: build
          script: NODE_ENV=production npm run build

        # -----------------------------------------------------------------
        # Stage 2：构建并推送 Docker 镜像（必须早于 deploy）
        # -----------------------------------------------------------------
        - name: docker info
          script: |
            set -eu
            echo "Registry: $CNB_DOCKER_REGISTRY"
            echo "Repo:     $CNB_REPO_SLUG_LOWERCASE"
            echo "Commit:   $CNB_COMMIT"
            echo "Image:    $IMAGE_REPO:latest"
            echo "Image:    $IMAGE_REPO:$CNB_COMMIT"
            docker version
        - name: docker build
          script: |
            set -eu
            docker build \
              --pull \
              -t "$IMAGE_REPO:$CNB_COMMIT" \
              -t "$IMAGE_REPO:latest" \
              .
        - name: docker push
          script: |
            set -eu
            docker push "$IMAGE_REPO:$CNB_COMMIT"
            docker push "$IMAGE_REPO:latest"
        - name: docker build (auth-server)
          script: |
            set -eu
            # 镜像名规则：在原 hi-agent 镜像名上拼 -auth 后缀，方便人工排查。
            AUTH_REPO="$IMAGE_REPO-auth"
            echo "AUTH_REPO=$AUTH_REPO" >> /tmp/auth_image.env
            docker build \
              --pull \
              -f server/Dockerfile \
              -t "$AUTH_REPO:$CNB_COMMIT" \
              -t "$AUTH_REPO:latest" \
              ./server
        - name: docker push (auth-server)
          script: |
            set -eu
            . /tmp/auth_image.env
            docker push "$AUTH_REPO:$CNB_COMMIT"
            docker push "$AUTH_REPO:latest"

        # -----------------------------------------------------------------
        # Stage 3：部署到目标服务器
        #   - 安装 ssh 客户端 → 校验密钥 → 写 ssh key → scp compose 文件
        #   - choose image tag：远端 docker pull 带重试，确保拉到本次 push 的镜像
        #   - resolve digest：把 tag 解析成不可变 RepoDigest 写入 .env
        #   - deploy：force-recreate 重建容器，避免 compose 因 image 引用未变
        #             而保留旧容器
        # -----------------------------------------------------------------
        - name: install ssh client
          script: |
            set -eu
            apt-get update -y
            apt-get install -y --no-install-recommends openssh-client ca-certificates
            rm -rf /var/lib/apt/lists/*
        - name: check secrets
          script: |
            set -eu
            : "${DEPLOY_HOST:?DEPLOY_HOST is not set in CNB secrets}"
            : "${DEPLOY_USER:?DEPLOY_USER is not set in CNB secrets}"
            : "${DEPLOY_SSH_KEY:?DEPLOY_SSH_KEY is not set in CNB secrets}"
            echo "DEPLOY_HOST bytes = ${#DEPLOY_HOST}"
            echo "DEPLOY_USER bytes = ${#DEPLOY_USER}"
            echo "DEPLOY_SSH_KEY bytes = ${#DEPLOY_SSH_KEY}"
            printf '%s' "$DEPLOY_HOST" | od -c | head -n 2
            printf '%s' "$DEPLOY_USER" | od -c | head -n 2
        - name: resolve image
          script: |
            set -eu
            echo "CNB_REPO_SLUG_LOWERCASE = [$CNB_REPO_SLUG_LOWERCASE]"
            echo "CNB_COMMIT              = [$CNB_COMMIT]"
            echo "IMAGE_REPO              = [$IMAGE_REPO]"
            echo "Target image (SHA)      = [$IMAGE_REPO:$CNB_COMMIT]"
            echo "Target image (latest)   = [$IMAGE_REPO:latest]"
        - name: prepare ssh key
          script: |
            set -eu
            mkdir -p ~/.ssh
            chmod 700 ~/.ssh
            CLEAN_HOST="$(printf '%s' "$DEPLOY_HOST" | tr -d '\r\n' | awk '{$1=$1;print}')"
            CLEAN_USER="$(printf '%s' "$DEPLOY_USER" | tr -d '\r\n' | awk '{$1=$1;print}')"
            export CLEAN_HOST CLEAN_USER
            echo "CLEAN_HOST = [$CLEAN_HOST]"
            echo "CLEAN_USER = [$CLEAN_USER]"
            printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
            chmod 600 ~/.ssh/id_ed25519
            ssh-keyscan -H "$CLEAN_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
            printf 'export CLEAN_HOST=%s\nexport CLEAN_USER=%s\n' \
              "$CLEAN_HOST" "$CLEAN_USER" > /tmp/deploy_env.sh
        - name: upload compose file
          script: |
            set -eu
            . /tmp/deploy_env.sh
            SCP_TARGET="$CLEAN_USER@$CLEAN_HOST:$DEPLOY_PATH/docker-compose.yml"
            echo "SCP target = [$SCP_TARGET]"
            scp -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 \
              deploy/docker-compose.yml \
              "$SCP_TARGET"
        - name: choose image tag
          script: |
            set -eu
            . /tmp/deploy_env.sh
            # 远端 docker pull 带重试：某些 registry 在 push 完成后存在
            # 短暂的可见性窗口。优先尝试本次 commit tag，再退到 latest。
            CHOSEN=""
            for TAG in "$CNB_COMMIT" latest; do
              for i in 1 2 3 4 5; do
                echo "[try #$i] ssh remote pull $IMAGE_REPO:$TAG"
                if ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 \
                     "$CLEAN_USER@$CLEAN_HOST" \
                     "docker pull $IMAGE_REPO:$TAG"
                then
                  CHOSEN="$TAG"
                  break 2
                fi
                sleep $((i * 3))
              done
            done
            if [ -z "$CHOSEN" ]; then
              echo "ERROR: could not pull any tag ($CNB_COMMIT / latest) from $IMAGE_REPO" >&2
              exit 1
            fi
            echo "CHOSEN_TAG = $CHOSEN"
            printf 'export CHOSEN_TAG=%s\n' "$CHOSEN" >> /tmp/deploy_env.sh

            # 进一步把 tag 解析成 RepoDigest（形如 repo@sha256:xxx），让 compose
            # 始终拿到不可变引用——tag 不变但 digest 变化时 compose 会感知到
            # image 字符串变化并重建容器，从根上杜绝「pull 成功但容器仍跑旧镜像」。
            DIGEST="$(ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 \
              "$CLEAN_USER@$CLEAN_HOST" \
              "docker image inspect --format '{{index .RepoDigests 0}}' $IMAGE_REPO:$CHOSEN" \
              2>/dev/null || true)"
            if [ -n "$DIGEST" ]; then
              echo "RESOLVED_IMAGE = $DIGEST"
              printf 'export RESOLVED_IMAGE=%s\n' "$DIGEST" >> /tmp/deploy_env.sh
            else
              # 兜底：解析失败时退回到 tag 引用，至少不阻断部署。
              echo "WARN: failed to resolve digest, fallback to tag reference"
              printf 'export RESOLVED_IMAGE=%s\n' "$IMAGE_REPO:$CHOSEN" >> /tmp/deploy_env.sh
            fi
            # ---- auth-server 镜像同样的拉取 + digest 解析 ----
            . /tmp/auth_image.env
            CHOSEN_AUTH=""
            for TAG in "$CNB_COMMIT" latest; do
              for i in 1 2 3 4 5; do
                echo "[try #$i] ssh remote pull $AUTH_REPO:$TAG"
                if ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 \
                     "$CLEAN_USER@$CLEAN_HOST" \
                     "docker pull $AUTH_REPO:$TAG"
                then
                  CHOSEN_AUTH="$TAG"
                  break 2
                fi
                sleep $((i * 3))
              done
            done
            if [ -z "$CHOSEN_AUTH" ]; then
              echo "ERROR: could not pull any auth tag" >&2; exit 1
            fi
            AUTH_DIGEST="$(ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 \
              "$CLEAN_USER@$CLEAN_HOST" \
              "docker image inspect --format '{{index .RepoDigests 0}}' $AUTH_REPO:$CHOSEN_AUTH" \
              2>/dev/null || true)"
            if [ -n "$AUTH_DIGEST" ]; then
              printf 'export RESOLVED_AUTH_IMAGE=%s\n' "$AUTH_DIGEST" >> /tmp/deploy_env.sh
            else
              printf 'export RESOLVED_AUTH_IMAGE=%s\n' "$AUTH_REPO:$CHOSEN_AUTH" >> /tmp/deploy_env.sh
            fi
        - name: write env file
          script: |
            set -eu
            . /tmp/deploy_env.sh
            ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 \
              "$CLEAN_USER@$CLEAN_HOST" \
              "printf 'HI_AGENT_IMAGE=%s\nAUTH_SERVER_IMAGE=%s\n' '$RESOLVED_IMAGE' '$RESOLVED_AUTH_IMAGE' > $DEPLOY_PATH/.env && cat $DEPLOY_PATH/.env"
        - name: deploy
          script: |
            set -eu
            . /tmp/deploy_env.sh
            # 重要：使用 --force-recreate 确保即使 .env 里的 image 引用字符串
            # 没变（例如仍然是 :latest），compose 也会用刚拉取的最新镜像重建
            # 容器，避免「pull 成功但容器仍跑旧镜像」。
            ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 \
              "$CLEAN_USER@$CLEAN_HOST" "
                set -eu
                cd $DEPLOY_PATH
                docker compose pull
                docker compose up -d --force-recreate --remove-orphans
                docker image prune -f
                docker compose ps
              "

    # =====================================================================
    # 知识库更新流水线（与上面 build-test-deploy 并行执行，互不阻塞）
    # =====================================================================
    - name: update-knowledge-base
      stages:
        - name: update
          type: knowledge:update
          options:
            include:
              - README.md
              - app/docs/**/*.mdx
              - docs/**/*.md
            exclude:
              - node_modules/**
              - .next/**
              - out/**
              - examples/**/workspace/**

$:
  pull_request:
    - name: verify
      docker:
        image: node:20
        volumes:
          - /root/.npm:copy-on-write
      env:
        NEXT_TELEMETRY_DISABLED: "1"
      stages:
        - name: install
          script: npm ci
        - name: test
          script: npm test
        - name: build
          script: NODE_ENV=production npm run build
